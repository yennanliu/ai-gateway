server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve proxy upstreams at request time, not at startup. In docker-compose
    # `governance-api` resolves via Docker's embedded DNS (127.0.0.11). On AWS the
    # ALB path-routes /api and /healthz to the control plane directly, so those
    # locations never reach this container and the name need not resolve here — but
    # nginx must still boot. A literal `proxy_pass http://governance-api:8080` forces
    # a startup-time DNS lookup that aborts nginx ("host not found in upstream")
    # wherever that name is absent; a variable in proxy_pass defers resolution so
    # nginx comes up regardless.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Control-plane API (docker-compose path; on AWS the ALB serves /api itself).
    location /api/ {
        set $control_plane governance-api:8080;
        proxy_pass http://$control_plane$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /healthz {
        set $control_plane governance-api:8080;
        proxy_pass http://$control_plane$request_uri;
    }
}
