# AI Gateway on-prem topology.
#   default profile: SQLite volume (zero external deps)
#   `--profile scale`: adds Postgres + Redis (point AIGW_DATABASE_URL at Postgres)
#
# Usage:
#   docker compose up --build
#   docker compose --profile scale up --build   # with Postgres + Redis
#
# `stub-provider` + `seed` bring the stack up pre-seeded with demo data and a
# compiled LiteLLM config, so litellm-proxy starts ready to serve a real
# /v1/chat/completions call with no external API key. See scripts/e2e_docker.sh
# for a scripted one-click run of the whole thing.
name: ai-gateway

services:
  governance-api:
    build:
      context: ../..
      dockerfile: deploy/docker/control-plane.Dockerfile
    environment:
      AIGW_DATABASE_URL: ${AIGW_DATABASE_URL:-sqlite:////data/ai-gateway.db}
      AIGW_REDIS_URL: ${AIGW_REDIS_URL:-}
      AIGW_LITELLM_CONFIG_PATH: /data/litellm.config.yaml
    volumes:
      - aigw-data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "uv", "run", "--package", "governance-api", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2)"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s

  # Fake OpenAI-compatible upstream so the full stack (including a real chat
  # completion through the proxy) runs with no real provider API key.
  stub-provider:
    build:
      context: ../..
      dockerfile: deploy/docker/control-plane.Dockerfile
    command: ["uv", "run", "--package", "governance-api", "python", "scripts/stub_provider.py"]
    environment:
      AIGW_STUB_PORT: "9099"
      AIGW_STUB_HOST: "0.0.0.0"
    ports:
      - "9099:9099"

  # One-shot: seed demo org/team/models (pointed at stub-provider) + compile
  # the LiteLLM config onto the shared volume. Runs once per `up`, then exits.
  seed:
    build:
      context: ../..
      dockerfile: deploy/docker/control-plane.Dockerfile
    command: ["uv", "run", "--package", "governance-api", "python", "scripts/seed.py"]
    environment:
      AIGW_DATABASE_URL: ${AIGW_DATABASE_URL:-sqlite:////data/ai-gateway.db}
      AIGW_LITELLM_CONFIG_PATH: /data/litellm.config.yaml
      AIGW_STUB_URL: http://stub-provider:9099
    volumes:
      - aigw-data:/data
    depends_on:
      governance-api:
        condition: service_healthy
      stub-provider:
        condition: service_started
    restart: "no"

  litellm-proxy:
    build:
      context: ../..
      dockerfile: deploy/docker/data-plane.Dockerfile
    environment:
      AIGW_DATABASE_URL: ${AIGW_DATABASE_URL:-sqlite:////data/ai-gateway.db}
      AIGW_LITELLM_CONFIG: /data/litellm.config.yaml
      # Dev-only stand-in credential; the stub provider ignores it (system-design §9).
      STUB_KEY: sk-stub-docker
    volumes:
      - aigw-data:/data
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "4000:4000"

  admin-ui:
    build:
      context: ../..
      dockerfile: deploy/docker/admin-ui.Dockerfile
    depends_on:
      - governance-api
    ports:
      - "8081:80"

  postgres:
    image: postgres:16
    profiles: ["scale"]
    environment:
      POSTGRES_USER: aigw
      POSTGRES_PASSWORD: aigw
      POSTGRES_DB: aigw
    volumes:
      - aigw-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    ports:
      - "6379:6379"

volumes:
  aigw-data:
  aigw-pg:
